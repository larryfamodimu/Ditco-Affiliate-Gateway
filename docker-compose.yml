services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ditco_postgres
    restart: unless-stopped
    env_file:
      - ./php-core/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - ditco_net
    healthcheck:
      # $$ is a compose escape for a literal $ — resolved inside the container
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # PostgreSQL port intentionally NOT exposed externally

  # ── PHP 8.2 / Apache API ───────────────────────────────────────────────────
  php-api:
    build:
      context: ./php-core
      dockerfile: Dockerfile
    container_name: ditco_php_api
    restart: unless-stopped
    ports:
      - "8080:80"
    env_file:
      - ./php-core/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ditco_net

  # ── Node.js Notification Microservice ─────────────────────────────────────
  notification-service:
    build:
      context: ./node-service
      dockerfile: Dockerfile
    container_name: ditco_notification
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    networks:
      - ditco_net

networks:
  ditco_net:
    driver: bridge

volumes:
  postgres_data:
